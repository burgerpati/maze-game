<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Maze Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="love-root">
  <h2 class="sr-only">Love-themed pixel art maze game. Navigate the heart character through the maze using arrow keys to reach the gift reward at the end.</h2>

  <div id="hud">
    <span class="hl">LEVEL</span><span class="hv" id="hl">1</span>
    <span class="hl">STEPS</span><span class="hv" id="hs">0</span>
    <span class="hl">HEARTS</span><span class="hv" id="hh">♥♥♥</span>
    <span class="hl">SCORE</span><span class="hv" id="hsc">0</span>
  </div>

  <div id="cv-wrap">
    <canvas id="gc" width="336" height="336"></canvas>
  </div>

  <div id="msg">
    USE ARROW KEYS TO MOVE<br>
    FIND YOUR WAY TO THE GIFT! ♥
  </div>

  <div id="btns">
    <button class="lb" onclick="startGame()">♥ NEW GAME</button>
    <button class="lb" onclick="skipLevel()">SKIP ♥</button>
  </div>

  <div id="reward-screen">
    <div id="confetti-wrap"></div>

    <div id="reward-title">YOU FOUND LOVE! ♥</div>

    <svg id="heart-art" viewBox="0 0 80 70" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="hglow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <path d="M40 60 C10 40 4 20 16 12 C24 6 34 10 40 18 C46 10 56 6 64 12 C76 20 70 40 40 60Z"
            fill="#e879a0" filter="url(#hglow)"/>

      <path d="M40 54 C16 36 10 20 20 14 C26 10 34 14 40 22 C46 14 54 10 60 14 C70 20 64 36 40 54Z"
            fill="#f9a8d4"/>

      <path d="M28 22 C26 18 30 15 34 20"
            stroke="#fff"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            opacity="0.6"/>

      <text x="40" y="36" text-anchor="middle" font-size="14" fill="#fff">
        ♥
      </text>

      <circle cx="16" cy="8" r="3" fill="#fde68a" opacity="0.9"/>
      <circle cx="64" cy="8" r="2" fill="#fde68a" opacity="0.7"/>
      <circle cx="8" cy="30" r="2" fill="#f9a8d4" opacity="0.8"/>
      <circle cx="72" cy="30" r="2" fill="#f9a8d4" opacity="0.8"/>
    </svg>

    <div id="reward-msg"></div>

    <button class="lb" onclick="nextLevelFromReward()">
      NEXT LEVEL ♥
    </button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
